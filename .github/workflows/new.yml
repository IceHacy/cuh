name: CI

on:
  workflow_dispatch:
    inputs:
      chrome_rd_auth_code:
        description: 'Chrome Remote Desktop Auth Code'
        required: true
      chrome_rd_pin:
        description: 'PIN (Min 6 digits)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEBIAN_FRONTEND: noninteractive
      
    steps:
    - name: Prep System
      run: |
        sudo systemctl stop apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true
        sudo rm -rf /var/lib/apt/lists/*
        
    - name: Add CRD Repo & Install
      run: |
        echo "deb [trusted=yes] http://dl.google.com/linux/chrome-remote-desktop/deb/ stable main" | sudo tee /etc/apt/sources.list.d/crd.list
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          chrome-remote-desktop \
          lxqt-core lxqt-panel lxqt-session lxqt-runner lxqt-config lxqt-about \
          pcmanfm-qt qterminal \
          arc-theme papirus-icon-theme \
          fonts-hack
        
    - name: Configure DE
      run: |
        echo 'exec startlxqt' | sudo tee /etc/chrome-remote-desktop-session
        sudo sed -i 's/^#*export DESKTOP_SESSION=.*/export DESKTOP_SESSION=lxqt/' /etc/X11/Xsession.d/40chrome-remote-desktop 2>/dev/null || true
        echo 'export XDG_CURRENT_DESKTOP=LXQt' | sudo tee -a /etc/X11/Xsession.d/40chrome-remote-desktop 2>/dev/null || true
        
    - name: Register CRD
      run: |
        sudo systemctl stop chrome-remote-desktop 2>/dev/null || true
        RANDOM_NAME="Linux-$(head -c 1000 /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 6)"
        DISPLAY= /opt/google/chrome-remote-desktop/chrome-remote-desktop \
          --code="${{ github.event.inputs.chrome_rd_auth_code }}" \
          --redirect-url="https://remotedesktop.google.com/_/oauthredirect" \
          --name="$RANDOM_NAME" \
          --pin="${{ github.event.inputs.chrome_rd_pin }}"
        
    - name: Start CRD
      run: |
        sudo systemctl enable --now chrome-remote-desktop
        
    - name: Keep Alive
      run: sleep 21600

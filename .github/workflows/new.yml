name: CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Setup
      run: |
        REDIRECT_URL=$(curl -s -o /dev/null -w "%{redirect_url}" https://github.com/tailscale/tailscale/releases/latest)
        LATEST_TAG=$(grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' <<< "$REDIRECT_URL")
        VERSION=${LATEST_TAG#v}
        
        curl -fsSL "https://github.com/tailscale/tailscale/releases/download/${LATEST_TAG}/tailscale_${VERSION}_amd64.tgz" -o tailscale.tgz
        tar -xzf tailscale.tgz
        
        sudo cp tailscale_${VERSION}_amd64/tailscaled /usr/sbin/tailscaled
        sudo cp tailscale_${VERSION}_amd64/tailscale /usr/bin/tailscale
        sudo chmod +x /usr/sbin/tailscaled /usr/bin/tailscale
        
        sudo mkdir -p /var/lib/tailscale /run/tailscale

        printf 'net.ipv4.ip_forward = 1\n' | sudo tee -a /etc/sysctl.conf > /dev/null
        printf 'net.ipv6.conf.all.forwarding = 1\n' | sudo tee -a /etc/sysctl.conf > /dev/null
        sudo sysctl -p > /dev/null

        sudo tailscaled &
        sleep 2

    - name: Authing
      env:
        TS_AUTHKEY: ${{ secrets.ts_auth }}
      run: |
        sudo tailscale up --authkey="$TS_AUTHKEY" --advertise-exit-node --hostname="gh-runner-${{ github.run_id }}"
        tailscale status

    - name: Sleep
      run: sleep 21600

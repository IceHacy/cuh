name: CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Setup
      run: |
        curl -fsSL https://tailscale.com/install.sh | sudo sh
        
        echo 'net.ipv4.ip_forward = 1' | sudo tee -a /etc/sysctl.conf
        echo 'net.ipv6.conf.all.forwarding = 1' | sudo tee -a /etc/sysctl.conf
        sudo sysctl -p
        
        sudo tailscaled &
        sleep 2

    - name: Authing
      env:
        TS_AUTHKEY: ${{ secrets.ts_auth }}
      run: |
        sudo tailscale up --authkey="$TS_AUTHKEY" --advertise-exit-node --hostname="gh-runner-${{ github.run_id }}"
        tailscale status

    - name: Sleep
      run: sleep 21600
